<!DOCTYPE html><html><body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.12;
  // Background
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#1a2235');
  g.addColorStop(1, '#0a0f1e');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  // Orange circle accent
  ctx.fillStyle = 'rgba(245,166,35,0.15)';
  ctx.beginPath();
  ctx.arc(size*0.7, size*0.3, size*0.4, 0, Math.PI*2);
  ctx.fill();
  // Drum emoji
  ctx.font = `${size*0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🥁', size/2, size/2 + size*0.03);
  // Bottom text
  ctx.fillStyle = '#f5a623';
  ctx.font = `bold ${size*0.1}px sans-serif`;
  ctx.fillText('PERCUSSION', size/2, size*0.85);
}
drawIcon('c192', 192);
drawIcon('c512', 512);
// Download links
['192','512'].forEach(s => {
  const c = document.getElementById('c'+s);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = 'icon-'+s+'.png';
  a.textContent = 'Download icon-'+s+'.png';
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});
</script>
</body></html>
